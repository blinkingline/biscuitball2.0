# STEP 1: Deploy this as-is, reload nginx, then run:
#   sudo certbot --nginx -d biscuitball.geeb.us
#
# STEP 2: Uncomment the HTTPS block below, change the HTTP block to redirect,
#         then reload nginx.

server {
    listen 80;
    server_name biscuitball.geeb.us;

    # Uncomment after cert is issued, remove the root/index lines below:
    # return 301 https://$host$request_uri;

    root /var/www/html/biscuitball2.0;
    index index.html;

    access_log /var/log/nginx/biscuitball2_access.log;
    error_log /var/log/nginx/biscuitball2_error.log info;
}

