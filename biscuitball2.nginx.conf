server {
    listen 80;
    server_name biscuitball.geeb.us;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    server_name biscuitball.geeb.us;
    root /var/www/html/biscuitball2.0;
    index index.html;

    ssl_protocols TLSv1.2;
    ssl_ciphers EECDH+AESGCM:EECDH+AES;
    ssl_ecdh_curve prime256v1;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    ssl_certificate     /etc/letsencrypt/live/biscuitball.geeb.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biscuitball.geeb.us/privkey.pem;

    access_log /var/log/nginx/biscuitball2_access.log;
    error_log /var/log/nginx/biscuitball2_error.log info;
}
